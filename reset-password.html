<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Elite Data Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFF; margin: 0; padding: 0; }
        .input-group:focus-within { border-color: #0052FF; background: white; box-shadow: 0 0 0 4px rgba(0, 82, 255, 0.05); }
        
        /* Elite Dark Mode */
        .dark body { background-color: #0B1120 !important; color: #F1F5F9 !important; }
        .dark .bg-white { background-color: #111827 !important; border-color: #1F2937 !important; color: #F1F5F9 !important; }
        .dark input { background-color: #1F2937 !important; border-color: #374151 !important; color: white !important; }
        .dark .text-slate-400, .dark .text-slate-500 { color: #94A3B8 !important; }
    </style>
    <script src="theme.js"></script>
</head>
<body class="text-[#081B4B] antialiased flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-[440px] bg-white p-8 lg:p-12 rounded-[40px] shadow-2xl border border-slate-50 relative overflow-hidden">
        
        <!-- Decorative Top Branding -->
        <div class="flex justify-center mb-8">
            <div class="w-14 h-14 bg-[#0052FF] rounded-2xl flex items-center justify-center text-white shadow-xl shadow-blue-200">
                <i data-lucide="shield-check" class="w-8 h-8 fill-current"></i>
            </div>
        </div>

        <div class="text-center mb-10">
            <h2 class="text-2xl font-black mb-2 dark:text-white">New Password</h2>
            <p class="text-slate-400 text-sm font-medium">Secure your Elite Data account</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-500 uppercase tracking-widest ml-1">Choose New Password</label>
                <div class="input-group flex items-center border border-slate-200 rounded-2xl bg-slate-50/50 px-4 transition-all relative">
                    <i data-lucide="lock" class="w-5 h-5 text-slate-300"></i>
                    
                    <!-- THE PASSWORD INPUT -->
                    <input type="password" id="newPassword" required 
                           class="w-full p-4 bg-transparent outline-none text-sm font-medium" 
                           placeholder="Min. 6 characters">
                    
                    <!-- THE TOGGLE BUTTON -->
                    <button type="button" onclick="togglePassword()" class="focus:outline-none">
                        <i id="eyeIcon" data-lucide="eye-off" class="w-5 h-5 text-slate-300 hover:text-[#0052FF] transition-colors"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="saveBtn" class="w-full bg-[#0052FF] text-white py-4.5 rounded-2xl font-black text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-95">
                Update Password
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="login.html" class="text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-[#0052FF] transition-colors">Return to Login</a>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="notifications.js"></script>
    <script>
        lucide.createIcons();

        // --- PASSWORD TOGGLE LOGIC ---
        function togglePassword() {
            const passInput = document.getElementById('newPassword');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            }
            lucide.createIcons(); // Refresh icons
        }

        // --- SUBMIT LOGIC ---
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const newPass = document.getElementById('newPassword').value;

            if(newPass.length < 6) {
                return showToast("Password must be at least 6 characters", "error");
            }

            btn.innerText = "Saving Changes...";
            btn.disabled = true;

            const { error } = await _supabase.auth.updateUser({ password: newPass });

            if (error) {
                showToast(error.message, "error");
                btn.innerText = "Update Password";
                btn.disabled = false;
            } else {
                showToast("Password updated! Security verified.", "success");
                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
