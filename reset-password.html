<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | ZApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ECFDF5;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Blob animations ── */
        @keyframes blob { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(8px,-12px) scale(1.06)} }
        .blob-a { animation: blob 8s ease-in-out infinite; }
        .blob-b { animation: blob 11s ease-in-out infinite reverse; }

        /* ── Input group ── */
        .input-group {
            display: flex; align-items: center;
            border: 1.5px solid #E4ECE7;
            border-radius: 16px;
            background: #ffffff;
            padding: 0 16px;
            transition: border-color .15s, box-shadow .15s;
            box-shadow: 0 2px 8px rgba(6,78,59,.04);
        }
        .input-group:focus-within {
            border-color: #0EA968;
            box-shadow: 0 0 0 3px rgba(14,169,104,.10);
        }
        .input-group input {
            width: 100%; padding: 14px 12px;
            background: transparent; outline: none;
            font-family: inherit; font-size: 14px;
            font-weight: 600; color: #064E3B;
        }
        .input-group input::placeholder { color: #c4cde0; font-weight: 500; }

        /* ── Strength bar ── */
        .strength-bar { height: 4px; border-radius: 99px; transition: width .3s ease, background .3s ease; }

        /* ── Dark mode ── */
        .dark body               { background-color: #0A130F !important; }
        .dark .reset-card        { background-color: #101914 !important; border-color: #1C2E24 !important; }
        .dark .input-group       { background-color: #152019 !important; border-color: #1C2E24 !important; }
        .dark .input-group:focus-within { border-color: #0EA968 !important; box-shadow: 0 0 0 3px rgba(14,169,104,.2) !important; }
        .dark .input-group input { color: #E4ECE7 !important; }
        .dark h2                 { color: #ffffff !important; }
        .dark .text-slate-400, .dark .text-slate-500 { color: #7C9388 !important; }
        .dark label              { color: #7C9388 !important; }
        .dark .strength-bg       { background-color: #1C2E24 !important; }
    </style>
    <script src="theme.js"></script>
</head>
<body class="antialiased p-6">

    <!-- Background blobs -->
    <div class="blob-a fixed -top-24 -right-20 w-80 h-80 bg-emerald-100/50 rounded-full blur-3xl pointer-events-none"></div>
    <div class="blob-b fixed -bottom-20 -left-16 w-64 h-64 bg-emerald-100/40 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-[420px] relative z-10">

        <!-- Logo above card -->
        <div class="flex items-center justify-center gap-3 mb-8">
            <div class="w-10 h-10 bg-[#0EA968] rounded-xl flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
            </div>
            <span class="text-xl font-extrabold italic text-[#064E3B] tracking-tight">ZApp</span>
        </div>

        <!-- Card -->
        <div class="reset-card bg-white rounded-[32px] shadow-xl shadow-emerald-900/5 border border-slate-100 p-8 lg:p-10">

            <!-- Icon + heading -->
            <div class="flex flex-col items-center text-center mb-8">
                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mb-5 shadow-sm">
                    <i data-lucide="shield-check" class="w-8 h-8 text-[#0EA968]"></i>
                </div>
                <h2 class="text-2xl font-black text-[#032B20] mb-1">Set New Password</h2>
                <p class="text-slate-400 text-sm font-medium">Secure your ZApp account</p>
            </div>

            <form id="resetForm" class="space-y-5">

                <!-- New password -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Choose New Password</label>
                    <div class="input-group">
                        <i data-lucide="lock" class="w-5 h-5 text-slate-300 shrink-0"></i>
                        <input type="password" id="newPassword" required
                            placeholder="Min. 6 characters"
                            oninput="checkStrength(this.value)">
                        <button type="button" onclick="togglePassword()" class="focus:outline-none ml-2 shrink-0">
                            <i id="eyeIcon" data-lucide="eye-off" class="w-5 h-5 text-slate-300 hover:text-[#0EA968] transition-colors"></i>
                        </button>
                    </div>

                    <!-- Strength indicator -->
                    <div class="px-1 space-y-1.5">
                        <div class="strength-bg w-full bg-slate-100 rounded-full h-1">
                            <div id="strengthBar" class="strength-bar w-0 bg-slate-300"></div>
                        </div>
                        <p id="strengthLabel" class="text-[10px] font-bold text-slate-300 uppercase tracking-widest"></p>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="saveBtn"
                    class="w-full bg-[#0EA968] text-white py-4 rounded-full font-black text-sm shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all active:scale-95 uppercase tracking-widest mt-2">
                    Update Password
                </button>
            </form>

            <!-- Back link -->
            <div class="mt-8 text-center">
                <a href="login.html"
                    class="inline-flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest hover:text-[#0EA968] transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Return to Login
                </a>
            </div>
        </div>

        <!-- SSL badge -->
        <p class="text-center mt-6 text-[11px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
            <i data-lucide="shield-check" class="w-4 h-4 text-[#0EA968]"></i> Secure SSL Encryption
        </p>

    </div>

    <script src="supabase-config.js"></script>
    <script src="notifications.js"></script>
    <script>
        lucide.createIcons();

        function togglePassword() {
            const input = document.getElementById('newPassword');
            const icon  = document.getElementById('eyeIcon');
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.setAttribute('data-lucide', input.type === 'password' ? 'eye-off' : 'eye');
            lucide.createIcons();
        }

        function checkStrength(val) {
            const bar   = document.getElementById('strengthBar');
            const label = document.getElementById('strengthLabel');
            if (!val) { bar.style.width = '0%'; label.textContent = ''; return; }

            let score = 0;
            if (val.length >= 6)  score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { w: '20%',  color: '#ef4444', text: 'Very weak'  },
                { w: '40%',  color: '#f97316', text: 'Weak'       },
                { w: '60%',  color: '#eab308', text: 'Fair'       },
                { w: '80%',  color: '#22c55e', text: 'Strong'     },
                { w: '100%', color: '#0EA968', text: 'Very strong' },
            ];
            const lvl = levels[Math.min(score - 1, 4)] || levels[0];
            bar.style.width     = lvl.w;
            bar.style.background = lvl.color;
            label.textContent   = lvl.text;
            label.style.color   = lvl.color;
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn     = document.getElementById('saveBtn');
            const newPass = document.getElementById('newPassword').value;

            if (newPass.length < 6) return showToast('Password must be at least 6 characters', 'error');

            btn.innerText = 'Saving...'; btn.disabled = true;

            const { error } = await _supabase.auth.updateUser({ password: newPass });

            if (error) {
                showToast(error.message, 'error');
                btn.innerText = 'Update Password'; btn.disabled = false;
            } else {
                showToast('Password updated! Redirecting...', 'success');
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        });
    </script>
</body>
</html>
