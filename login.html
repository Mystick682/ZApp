<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elite Data Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfdfe; }
        .tab-active { color: #0052FF; border-bottom: 3px solid #0052FF; }
        .input-group:focus-within { border-color: #0052FF; background: white; box-shadow: 0 0 0 4px rgba(0, 82, 255, 0.05); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-toast { animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .dark body { background-color: #0B1120 !important; color: #F1F5F9 !important; }
        .dark .bg-white, .dark aside, .dark nav, .dark header { background-color: #111827 !important; border-color: #1F2937 !important; color: #F1F5F9 !important; }
    </style>
</head>
<body class="text-[#081B4B] antialiased">

    <!-- FORGOT PASSWORD MODAL -->
    <div id="forgotModal" class="fixed inset-0 z-[100] flex items-center justify-center p-6 hidden">
        <div class="fixed inset-0 bg-[#081B4B]/60 backdrop-blur-sm"></div>
        <div class="bg-white dark:bg-[#111827] w-full max-w-sm rounded-[32px] p-8 relative z-10 shadow-2xl border border-slate-100 dark:border-slate-800 text-center">
            <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="help-circle" class="w-8 h-8 text-[#0052FF]"></i>
            </div>
            <h3 class="text-xl font-black mb-2 dark:text-white">Reset Password</h3>
            <p class="text-slate-400 text-xs font-medium mb-8">Enter your email to receive a password reset link.</p>
            
            <input type="email" id="resetEmail" class="w-full p-4 mb-6 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none focus:border-[#0052FF]" placeholder="Enter your email">

            <div class="flex flex-col gap-3">
                <button onclick="handleResetRequest()" id="resetBtn" class="w-full bg-[#0052FF] text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all">Send Link</button>
                <button onclick="closeForgotModal()" class="w-full py-3 text-slate-400 font-bold text-xs uppercase tracking-widest">Back to Login</button>
            </div>
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-6 lg:p-12">
        <div class="w-full max-w-[440px]">
            <div class="bg-white p-8 lg:p-10 rounded-[32px] shadow-2xl shadow-blue-900/5 border border-slate-50">
                
                <div class="text-center mb-10">
                    <div class="w-12 h-12 bg-[#0052FF] rounded-2xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg shadow-blue-200">
                        <i data-lucide="zap" class="w-7 h-7 fill-current"></i>
                    </div>
                    <h2 class="text-3xl font-extrabold mb-2">Welcome Back 👋</h2>
                    <p class="text-slate-400 text-sm font-medium">Enter your credentials to continue</p>
                </div>

                <div class="flex border-b border-slate-100 mb-8 text-center">
                    <div class="flex-1 pb-3 text-sm font-bold tab-active cursor-pointer">Login</div>
                    <a href="register.html" class="flex-1 pb-3 text-sm font-bold text-slate-300">Register</a>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em] ml-1">Email Address</label>
                        <div class="input-group flex items-center border border-slate-200 rounded-2xl bg-slate-50/50 px-4 transition-all">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-300"></i>
                            <input type="email" id="email" required class="w-full p-4 bg-transparent outline-none text-sm font-medium" placeholder="Enter your email">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between px-1">
                            <label class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.15em]">Password</label>
                            <!-- Click calls openForgotModal() -->
                            <button type="button" onclick="openForgotModal()" class="text-[11px] font-bold text-[#0052FF] uppercase tracking-wider">Forgot?</button>
                        </div>
                        <div class="input-group flex items-center border border-slate-200 rounded-2xl bg-slate-50/50 px-4 transition-all relative">
                            <i data-lucide="lock" class="w-5 h-5 text-slate-300"></i>
                            <input type="password" id="password" required class="w-full p-4 bg-transparent outline-none text-sm font-medium" placeholder="••••••••">
                            <button type="button" onclick="togglePasswordVisibility()" class="focus:outline-none">
                                <i id="eyeIcon" data-lucide="eye-off" class="w-5 h-5 text-slate-300 hover:text-[#0052FF] transition-colors"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="loginBtn" class="w-full bg-[#0052FF] text-white py-4.5 rounded-2xl font-extrabold text-lg shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all active:scale-[0.98]">
                        Login
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="notifications.js"></script>
    <script src="supabase-config.js"></script>
    <script>
        lucide.createIcons();

        function togglePasswordVisibility() {
            const pass = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            pass.type = pass.type === 'password' ? 'text' : 'password';
            icon.setAttribute('data-lucide', pass.type === 'password' ? 'eye-off' : 'eye');
            lucide.createIcons();
        }

        function openForgotModal() { document.getElementById('forgotModal').classList.remove('hidden'); }
        function closeForgotModal() { document.getElementById('forgotModal').classList.add('hidden'); }

       async function handleResetRequest() {
    const email = document.getElementById('resetEmail').value;
    const btn = document.getElementById('resetBtn');
    if (!email) return showToast("Enter your email address", "error");

    btn.innerText = "Sending...";
    btn.disabled = true;

    // THIS LINE AUTOMATICALLY DETECTS VERCEL OR LOCALHOST
    const redirectUrl = window.location.origin + "/reset-password.html";
    console.log("Supabase will redirect to:", redirectUrl);

    const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: redirectUrl,
    });

    if (error) {
        showToast(error.message, "error");
    } else {
        showToast("Reset link sent to " + email);
        closeForgotModal();
    }
    btn.innerText = "Send Link";
    btn.disabled = false;
}
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Logging in...";
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            });
            if (error) {
                showToast(error.message, "error");
                btn.innerText = "Login";
            } else {
                showToast("Welcome back!");
                setTimeout(() => window.location.href = "dashboard.html", 1000);
            }
        });
    </script>
</body>
</html>
